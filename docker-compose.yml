services:
  surrealdb:
    image: surrealdb/surrealdb:${SURREALDB_TAG:-latest}
    container_name: nn-notebook-surrealdb
    # Credentials come from THIS project's .env (open-notebook/.env). Fail fast
    # if the password was not set — never fall back to the insecure root/root.
    command: start -u ${SURREAL_ROOT_USER:-root} -p ${SURREAL_ROOT_PASS:?set SURREAL_ROOT_PASS in open-notebook/.env} surrealkv:///data/mydatabase.db
    user: root  # Required for bind mounts on Linux
    ports:
      - "8555:8000"
    volumes:
      - surrealdb_data:/data
    networks:
      - marinha-net
    restart: always
    mem_limit: ${SURREALDB_MEM_LIMIT:-8g}
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-20m}
        max-file: "${LOG_MAX_FILE:-5}"
    # The SurrealDB image is distroless (no curl/shell) — use the surreal
    # binary's own readiness probe instead of curl.
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  nn-notebook:
    container_name: nn-notebook
    image: nn-notebook:local
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    ports:
      # Only the frontend (Web UI) is published. The REST API on 5055 stays
      # internal to the container — the frontend proxies /api/* to it via the
      # Next.js rewrite (localhost:5055). Do NOT expose 5055 publicly.
      - "3675:3675"  # Web UI (reverse-proxy / Cloudflare points here)
    env_file:
      - .env
      # Runtime overrides you can edit on the cluster WITHOUT rebuilding the image.
      # Plain app vars here win over .env. Recreate to apply: docker compose up -d
      # To ALSO override interpolated values (image tags, mem limits, and the
      # ${VAR:-default} entries in `environment:` below), run compose with:
      #   export COMPOSE_ENV_FILES=.env,.env.local   (see .env.local.example)
      # Optional — the stack still starts if the file is absent.
      - path: .env.local
        required: false
    environment:
      # Override DB host so the container talks to the surrealdb service
      # via the compose network (overrides any SURREAL_URL in .env).
      - SURREAL_URL=ws://surrealdb:8000/rpc
      # DB credentials from open-notebook/.env — MUST match the surrealdb service
      # above. No more hardcoded root/root.
      - SURREAL_USER=${SURREAL_ROOT_USER:-root}
      - SURREAL_PASS=${SURREAL_ROOT_PASS:?set SURREAL_ROOT_PASS in open-notebook/.env}
      - SURREAL_PASSWORD=${SURREAL_ROOT_PASS:?set SURREAL_ROOT_PASS in open-notebook/.env}
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      # Reach NOVA-Researcher services by their container names on the
      # shared ``marinha-net`` network.
      - NOVA_RESEARCHER_URL=http://nova-researcher:3800
      - WHISPER_API_URL=http://nova-whisper:4805
      - SAM3_API_URL=http://nova-sam3:4800
      - NOMIC_SERVER_URL=http://nova-nomic:4801
      - RFDETR_API_URL=http://nova-rf-detr:4802
      - BGE_M3_SERVER_URL=http://nova-bge-m3:4803
      - CLIP_SERVER_URL=http://nova-clip:4804
      # ── Chart generator tunables (POST /api/charts/generate) ─────────
      # pandas/matplotlib/openpyxl/tabulate are bundled in the image.
      # Increase these if you need to handle larger data files.
      - CHART_MAX_FILE_SIZE_MB=${CHART_MAX_FILE_SIZE_MB:-25}
      - CHART_MAX_ROWS=${CHART_MAX_ROWS:-100000}
      - CHART_MAX_SERIES=${CHART_MAX_SERIES:-6}
      # ── Uvicorn production settings ──────────────────────────────────
      # Workers: WAL mode makes 2 safe; keep ≤ 4 (SQLite checkpoint store limit)
      - API_WORKERS=${API_WORKERS:-4}
      - API_BACKLOG=${API_BACKLOG:-2048}
      - API_TIMEOUT_KEEP_ALIVE=${API_TIMEOUT_KEEP_ALIVE:-75}
      - API_RELOAD=false
    volumes:
      - ./notebook_data:/app/data
    # Start once the DB container is up; the app retries the connection
    # (SURREAL_CONNECT_ATTEMPTS) and restarts if the DB isn't ready yet, so a
    # healthcheck quirk can never leave the app permanently blocked.
    depends_on:
      surrealdb:
        condition: service_started
    networks:
      - marinha-net
    restart: always
    mem_limit: ${NN_NOTEBOOK_MEM_LIMIT:-12g}
    logging:
      driver: json-file
      options:
        max-size: ${LOG_MAX_SIZE:-20m}
        max-file: "${LOG_MAX_FILE:-5}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5055/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  surrealdb_data:

networks:
  marinha-net:
    external: true
