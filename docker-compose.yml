services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: nn-notebook-surrealdb
    command: start -u root -p root surrealkv:///data/mydatabase.db
    user: root  # Required for bind mounts on Linux
    ports:
      - "8555:8000"
    volumes:
      - surrealdb_data:/data
    networks:
      - marinha-net
    restart: always
    pull_policy: always

  nn-notebook:
    container_name: nn-notebook
    image: nn-notebook:local
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    ports:
      - "3675:3675"  # Web UI
      - "5055:5055"  # REST API
    env_file:
      - .env
    environment:
      # Override DB host so the container talks to the surrealdb service
      # via the compose network (overrides any SURREAL_URL in .env).
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASS=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      # Reach NOVA-Researcher services by their container names on the
      # shared ``marinha-net`` network.
      - NOVA_RESEARCHER_URL=http://nova-researcher:3800
      - GPT_RESEARCHER_URL=http://nova-researcher:3800
      - WHISPER_API_URL=http://nova-whisper:4805
      - SAM3_API_URL=http://nova-sam3:4800
      - NOMIC_SERVER_URL=http://nova-nomic:4801
      - RFDETR_API_URL=http://nova-rf-detr:4802
      - BGE_M3_SERVER_URL=http://nova-bge-m3:4803
      - CLIP_SERVER_URL=http://nova-clip:4804
      # ── Uvicorn production settings ──────────────────────────────────
      # Workers: WAL mode makes 2 safe; keep ≤ 4 (SQLite checkpoint store limit)
      - API_WORKERS=${API_WORKERS:-4}
      - API_BACKLOG=${API_BACKLOG:-2048}
      - API_TIMEOUT_KEEP_ALIVE=${API_TIMEOUT_KEEP_ALIVE:-75}
      - API_RELOAD=false
    volumes:
      - ./notebook_data:/app/data
    depends_on:
      - surrealdb
    networks:
      - marinha-net
    restart: always

volumes:
  surrealdb_data:

networks:
  marinha-net:
    external: true
