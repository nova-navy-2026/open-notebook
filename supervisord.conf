[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid

[program:api]
; API_WORKERS   — number of Uvicorn worker processes (default: 2).
;                 Keep ≤ 4 because LangGraph uses a SQLite checkpoint store;
;                 more workers can cause write-lock contention on that file.
; API_BACKLOG    — OS listen() queue depth (default: 2048).
; API_TIMEOUT_KEEP_ALIVE — seconds before closing an idle connection (default: 75).
command=bash -c "
    exec uv run --no-sync uvicorn api.main:app \
        --host 0.0.0.0 \
        --port 5055 \
        --workers ${API_WORKERS:-2} \
        --loop uvloop \
        --backlog ${API_BACKLOG:-2048} \
        --timeout-keep-alive ${API_TIMEOUT_KEEP_ALIVE:-75} \
        --no-server-header
"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=10
autostart=true

[program:worker]
command=bash -c "uv run --no-sync python /app/scripts/ensure-command-table.py && exec uv run --no-sync surreal-commands-worker --import-modules commands"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=20
autostart=true
startsecs=3

[program:frontend]
command=bash -c "/app/scripts/wait-for-api.sh && node server.js"
directory=/app/frontend
environment=NODE_ENV="production",PORT="3675"
passenv=API_URL,NEXT_PUBLIC_API_URL,INTERNAL_API_URL
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
priority=30
autostart=true
startsecs=10
